<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agro Tech Connect - Login/Register</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h2>Farmer / Bulk Buyer Registration</h2>
      <form id="registerForm" class="stack">
        <input id="regName" placeholder="Full name" required>
        <input id="regEmail" type="email" placeholder="Email" required>
        <input id="regPassword" type="password" placeholder="Password" required>
        <select id="regRole" required>
          <option value="farmer">Farmer</option>
          <option value="bulk_buyer">Bulk Buyer</option>
        </select>
        <input id="regDistrict" placeholder="District">
        <input id="regOrganization" placeholder="Organization (optional)">
        <button type="submit">Create Account</button>
      </form>
    </section>

    <section class="card">
      <h2>Login</h2>
      <form id="loginForm" class="stack">
        <input id="loginEmail" type="email" placeholder="Email" required>
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p id="statusText"></p>
      <p><a href="/">Back to marketplace</a></p>
      <p><a href="/admin">Admin interface</a></p>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script>
    const statusText = document.getElementById("statusText");

    function setStatus(text) {
      statusText.textContent = text;
    }

    document.getElementById("registerForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const result = await API.register({
          name: document.getElementById("regName").value,
          email: document.getElementById("regEmail").value,
          password: document.getElementById("regPassword").value,
          role: document.getElementById("regRole").value,
          district: document.getElementById("regDistrict").value,
          organization: document.getElementById("regOrganization").value
        });
        API.setToken(result.token);
        setStatus(`Registered and logged in as ${result.user.role}.`);
        event.target.reset();
        if (result.user.role === 'farmer') {
          window.location.href = '/farmer';
        } else if (result.user.role === 'bulk_buyer') {
          window.location.href = '/buyer';
        }
      } catch (error) {
        setStatus(error.message);
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const result = await API.login({
          email: document.getElementById("loginEmail").value,
          password: document.getElementById("loginPassword").value
        });
        API.setToken(result.token);
        setStatus(`Logged in as ${result.user.role}.`);
        if (result.user.role === 'farmer') {
          window.location.href = '/farmer';
        } else if (result.user.role === 'bulk_buyer') {
          window.location.href = '/buyer';
        } else {
          window.location.href = '/';
        }
      } catch (error) {
        setStatus(error.message);
      }
    });
  </script>
</body>
</html>
